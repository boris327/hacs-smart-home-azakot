################################################################################
# 🇮🇱 פיקוד העורף — דשבורד מפה ומעקב אזעקות
# דרישות: mushroom-cards, button-card, card-mod, config-template-card (HACS)
################################################################################

title: 🚨 פיקוד העורף
icon: mdi:shield-alert
path: oref-map
theme: dark-red-alert
background: "radial-gradient(ellipse at top, #0a0f1e 0%, #050810 100%)"
type: custom:masonry-layout
layout:
  max_cols: 3

cards:

  # ════════════════════════════════════════════════════════════════
  # SECTION 1: כותרת + סטטוס כולל
  # ════════════════════════════════════════════════════════════════

  - type: custom:button-card
    entity: binary_sensor.oref_alert_active
    show_name: false
    show_icon: false
    styles:
      card:
        - border-radius: 16px
        - padding: 0
        - overflow: hidden
        - box-shadow: >
            [[[ return entity.state === 'on'
              ? '0 0 60px rgba(255,30,30,0.6), 0 0 120px rgba(255,30,30,0.2)'
              : '0 0 30px rgba(0,200,100,0.2)' ]]]
        - border: >
            [[[ return entity.state === 'on'
              ? '2px solid rgba(255,60,60,0.8)'
              : '2px solid rgba(0,200,100,0.4)' ]]]
        - animation: >
            [[[ return entity.state === 'on' ? 'pulse-red 1s ease-in-out infinite' : 'none' ]]]
        - background: >
            [[[ return entity.state === 'on'
              ? 'linear-gradient(135deg, #1a0505 0%, #2d0808 50%, #1a0505 100%)'
              : 'linear-gradient(135deg, #041a0e 0%, #07291a 50%, #041a0e 100%)' ]]]
    custom_fields:
      status_bar:
        card:
          type: markdown
          content: >
            {% set active = is_state('binary_sensor.oref_alert_active', 'on') %}
            {% set zones = states('sensor.oref_alert_zones_count') | int(0) %}
            {% set title = state_attr('sensor.oref_active_alert', 'title') %}
            {% if active %}
            <div style="
              display: flex;
              align-items: center;
              justify-content: space-between;
              padding: 18px 24px;
              direction: rtl;
              font-family: 'Heebo', sans-serif;
            ">
              <div style="display: flex; align-items: center; gap: 16px;">
                <div style="
                  width: 20px; height: 20px;
                  border-radius: 50%;
                  background: #ff2020;
                  box-shadow: 0 0 20px #ff2020;
                  animation: blink 0.8s ease-in-out infinite;
                "></div>
                <span style="
                  font-size: 1.6em;
                  font-weight: 900;
                  color: #ff4040;
                  letter-spacing: 2px;
                  text-transform: uppercase;
                ">🚨 אזעקה פעילה!</span>
              </div>
              <div style="text-align: left; color: #ff9090;">
                <div style="font-size: 1.1em; font-weight: 700;">{{ title }}</div>
                <div style="font-size: 0.85em; opacity: 0.8;">{{ zones }} אזורים מוזהרים</div>
              </div>
            </div>
            {% else %}
            <div style="
              display: flex;
              align-items: center;
              justify-content: space-between;
              padding: 18px 24px;
              direction: rtl;
              font-family: 'Heebo', sans-serif;
            ">
              <div style="display: flex; align-items: center; gap: 16px;">
                <div style="
                  width: 16px; height: 16px;
                  border-radius: 50%;
                  background: #00e676;
                  box-shadow: 0 0 15px #00e676;
                "></div>
                <span style="
                  font-size: 1.4em;
                  font-weight: 800;
                  color: #00e676;
                ">✅ אין אזעקות פעילות</span>
              </div>
              <div style="color: #40ff90; opacity: 0.7; font-size: 0.9em; direction: ltr;">
                {{ now().strftime('%H:%M:%S') }}
              </div>
            </div>
            {% endif %}
          style: |
            ha-card {
              background: transparent !important;
              border: none !important;
              box-shadow: none !important;
              padding: 0 !important;
              margin: 0 !important;
            }
            ha-markdown {
              padding: 0 !important;
            }
    styles_card:
      - type: custom:card-mod
        style: |
          ha-card {
            --ha-card-background: transparent;
          }
          @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 40px rgba(255,30,30,0.5); }
            50% { box-shadow: 0 0 80px rgba(255,30,30,0.9), 0 0 160px rgba(255,0,0,0.3); }
          }
          @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
          }

  # ════════════════════════════════════════════════════════════════
  # SECTION 2: מפת ישראל (iframe לאתר פיקוד העורף)
  # ════════════════════════════════════════════════════════════════

  - type: vertical-stack
    cards:
      - type: custom:button-card
        show_name: false
        show_icon: false
        tap_action:
          action: url
          url_path: "https://www.oref.org.il/11226-he/Pakar.aspx"
        styles:
          card:
            - background: "linear-gradient(90deg, #0a0f1e, #0f1628, #0a0f1e)"
            - border-radius: "12px 12px 0 0"
            - padding: "10px 20px"
            - border: "1px solid rgba(100,150,255,0.3)"
            - border-bottom: "none"
        custom_fields:
          header:
            card:
              type: markdown
              content: |
                <div style="
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  direction: rtl;
                  font-family: 'Heebo', sans-serif;
                ">
                  <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="font-size: 1.3em;">🗺️</span>
                    <span style="
                      font-size: 1em;
                      font-weight: 700;
                      color: #8ab4ff;
                      letter-spacing: 1px;
                    ">מפת ישראל — פיקוד העורף</span>
                  </div>
                  <span style="
                    font-size: 0.75em;
                    color: #4a6fa5;
                    display: flex;
                    align-items: center;
                    gap: 6px;
                  ">
                    לחץ לפתיחה באתר
                    <ha-icon icon="mdi:open-in-new" style="--mdc-icon-size: 14px;"></ha-icon>
                  </span>
                </div>
              style: |
                ha-card { background: transparent !important; border: none !important; box-shadow: none !important; }

      - type: iframe
        url: "https://www.oref.org.il/11226-he/Pakar.aspx"
        aspect_ratio: "70%"
        card_mod:
          style: |
            ha-card {
              border-radius: 0 0 12px 12px !important;
              border: 1px solid rgba(100,150,255,0.3) !important;
              border-top: none !important;
              overflow: hidden !important;
              background: #050810 !important;
            }

  # ════════════════════════════════════════════════════════════════
  # SECTION 3: אזורים תחת אזעקה + פרטים
  # ════════════════════════════════════════════════════════════════

  - type: vertical-stack
    cards:

      # כותרת פאנל אזעקות
      - type: custom:button-card
        show_name: false
        show_icon: false
        styles:
          card:
            - background: "linear-gradient(135deg, #1a0820 0%, #0d1530 100%)"
            - border-radius: "12px 12px 0 0"
            - padding: "12px 20px"
            - border: "1px solid rgba(200,100,255,0.3)"
            - border-bottom: "2px solid rgba(200,100,255,0.5)"
        custom_fields:
          title:
            card:
              type: markdown
              content: |
                <div style="
                  display: flex;
                  align-items: center;
                  gap: 10px;
                  direction: rtl;
                  font-family: 'Heebo', sans-serif;
                ">
                  <ha-icon icon="mdi:map-marker-alert" style="color: #c864ff; --mdc-icon-size: 22px;"></ha-icon>
                  <span style="font-size: 1em; font-weight: 700; color: #c864ff;">אזורים מוזהרים עכשיו</span>
                  <span style="
                    margin-right: auto;
                    background: rgba(200,100,255,0.2);
                    border: 1px solid rgba(200,100,255,0.4);
                    border-radius: 20px;
                    padding: 2px 10px;
                    font-size: 0.8em;
                    color: #c864ff;
                  ">{{ states('sensor.oref_alert_zones_count') }} אזורים</span>
                </div>
              style: |
                ha-card { background: transparent !important; border: none !important; box-shadow: none !important; }

      # רשימת אזורים
      - type: markdown
        content: >
          {% set active = is_state('binary_sensor.oref_alert_active', 'on') %}
          {% set areas = state_attr('sensor.oref_active_alert', 'data') %}
          {% set category = states('sensor.oref_alert_category') %}
          {% set desc = state_attr('sensor.oref_active_alert', 'desc') %}

          <div style="direction: rtl; font-family: 'Heebo', sans-serif; padding: 8px 0;">

          {% if active and areas %}
          <div style="margin-bottom: 12px; padding: 10px 14px; background: rgba(255,50,50,0.1); border-radius: 8px; border-right: 3px solid #ff3030;">
            <div style="font-size: 0.8em; color: #ff7070; font-weight: 600;">סוג אירוע</div>
            <div style="font-size: 1em; color: #ffaaaa; margin-top: 3px;">{{ category }}</div>
          </div>
          {% if desc %}
          <div style="margin-bottom: 12px; padding: 10px 14px; background: rgba(255,120,0,0.1); border-radius: 8px; border-right: 3px solid #ff8c00;">
            <div style="font-size: 0.8em; color: #ffaa40; font-weight: 600;">הנחיות</div>
            <div style="font-size: 0.85em; color: #ffcc80; margin-top: 3px; line-height: 1.5;">{{ desc }}</div>
          </div>
          {% endif %}
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px;">
          {% for area in areas %}
          <div style="
            background: rgba(255,40,40,0.15);
            border: 1px solid rgba(255,60,60,0.4);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.9em;
            color: #ffaaaa;
            display: flex;
            align-items: center;
            gap: 6px;
          ">
            <span style="color: #ff4040; font-size: 1.1em;">📍</span>
            <span>{{ area }}</span>
          </div>
          {% endfor %}
          </div>
          {% else %}
          <div style="
            text-align: center;
            padding: 30px;
            color: #00e676;
            font-size: 1.1em;
          ">
            <div style="font-size: 2.5em; margin-bottom: 10px;">🛡️</div>
            <div style="font-weight: 700;">האזור שקט</div>
            <div style="font-size: 0.8em; opacity: 0.6; margin-top: 6px;">אין אזעקות פעילות כרגע</div>
          </div>
          {% endif %}

          </div>
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, #0d0d1f 0%, #0a1020 100%) !important;
              border: 1px solid rgba(200,100,255,0.25) !important;
              border-top: none !important;
              border-radius: 0 0 12px 12px !important;
              box-shadow: none !important;
            }

  # ════════════════════════════════════════════════════════════════
  # SECTION 4: קישורים מהירים לאתרי פיקוד העורף
  # ════════════════════════════════════════════════════════════════

  - type: horizontal-stack
    cards:

      - type: custom:button-card
        name: "אתר פיקוד העורף"
        icon: mdi:web
        tap_action:
          action: url
          url_path: "https://www.oref.org.il"
        styles:
          card:
            - background: "linear-gradient(135deg, #0d1525 0%, #1a2540 100%)"
            - border: "1px solid rgba(100,150,255,0.3)"
            - border-radius: "12px"
          name:
            - color: "#8ab4ff"
            - font-size: "0.8em"
            - font-family: "'Heebo', sans-serif"
          icon:
            - color: "#8ab4ff"

      - type: custom:button-card
        name: "היסטוריית אזעקות"
        icon: mdi:history
        tap_action:
          action: url
          url_path: "https://www.oref.org.il/11226-he/Pakar.aspx"
        styles:
          card:
            - background: "linear-gradient(135deg, #1a0d25 0%, #2a1540 100%)"
            - border: "1px solid rgba(200,100,255,0.3)"
            - border-radius: "12px"
          name:
            - color: "#c864ff"
            - font-size: "0.8em"
            - font-family: "'Heebo', sans-serif"
          icon:
            - color: "#c864ff"

      - type: custom:button-card
        name: "אפליקציית אורט"
        icon: mdi:cellphone-alert
        tap_action:
          action: url
          url_path: "https://www.oref.org.il/1096-he/MabatLaAdam.aspx"
        styles:
          card:
            - background: "linear-gradient(135deg, #1a0505 0%, #2d0808 100%)"
            - border: "1px solid rgba(255,100,100,0.3)"
            - border-radius: "12px"
          name:
            - color: "#ff7070"
            - font-size: "0.8em"
            - font-family: "'Heebo', sans-serif"
          icon:
            - color: "#ff7070"

  # ════════════════════════════════════════════════════════════════
  # SECTION 5: היסטוריית אזעקות אחרונות
  # ════════════════════════════════════════════════════════════════

  - type: vertical-stack
    cards:
      - type: custom:button-card
        show_name: false
        show_icon: false
        styles:
          card:
            - background: "linear-gradient(135deg, #0a1520 0%, #0f1a2a 100%)"
            - border-radius: "12px 12px 0 0"
            - padding: "12px 20px"
            - border: "1px solid rgba(100,180,255,0.3)"
            - border-bottom: "2px solid rgba(100,180,255,0.4)"
        custom_fields:
          title:
            card:
              type: markdown
              content: |
                <div style="
                  display: flex;
                  align-items: center;
                  gap: 10px;
                  direction: rtl;
                  font-family: 'Heebo', sans-serif;
                ">
                  <ha-icon icon="mdi:clock-alert-outline" style="color: #64b4ff; --mdc-icon-size: 22px;"></ha-icon>
                  <span style="font-size: 1em; font-weight: 700; color: #64b4ff;">היסטוריית אזעקות — 24 שעות אחרונות</span>
                  <span style="
                    margin-right: auto;
                    background: rgba(100,180,255,0.15);
                    border: 1px solid rgba(100,180,255,0.35);
                    border-radius: 20px;
                    padding: 2px 10px;
                    font-size: 0.8em;
                    color: #64b4ff;
                  ">{{ states('sensor.oref_alert_history') }} אירועים</span>
                </div>
              style: |
                ha-card { background: transparent !important; border: none !important; box-shadow: none !important; }

      - type: markdown
        content: >
          {% set history_count = states('sensor.oref_alert_history') | int(0) %}

          <div style="direction: rtl; font-family: 'Heebo', sans-serif; padding: 8px 0;">
          {% if history_count > 0 %}
          <div style="
            overflow-x: auto;
          ">
          <table style="
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
          ">
            <thead>
              <tr style="border-bottom: 1px solid rgba(100,180,255,0.3);">
                <th style="padding: 8px 12px; color: #64b4ff; text-align: right; font-weight: 600;">זמן</th>
                <th style="padding: 8px 12px; color: #64b4ff; text-align: right; font-weight: 600;">סוג</th>
                <th style="padding: 8px 12px; color: #64b4ff; text-align: right; font-weight: 600;">אזורים</th>
              </tr>
            </thead>
            <tbody>
              {% for i in range([history_count, 10] | min) %}
              <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                <td style="padding: 7px 12px; color: #8899bb;">—</td>
                <td style="padding: 7px 12px; color: #aabbdd;">—</td>
                <td style="padding: 7px 12px; color: #ccddf0;">נתונים מה-API</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
          <div style="
            text-align: center;
            margin-top: 12px;
            padding: 8px;
            background: rgba(100,180,255,0.05);
            border-radius: 8px;
            color: #4a7aaa;
            font-size: 0.8em;
          ">
            לפרטים מלאים —
            <a href="https://www.oref.org.il/11226-he/Pakar.aspx"
               style="color: #64b4ff; text-decoration: none;"
               target="_blank">אתר פיקוד העורף</a>
          </div>
          </div>
          {% else %}
          <div style="
            text-align: center;
            padding: 25px;
            color: #4a7aaa;
          ">
            <div style="font-size: 2em; margin-bottom: 8px;">📭</div>
            <div>אין נתוני היסטוריה זמינים</div>
            <div style="font-size: 0.8em; margin-top: 4px; opacity: 0.6;">הנתונים מתעדכנים כל דקה</div>
          </div>
          {% endif %}
          </div>
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, #080d18 0%, #0a1220 100%) !important;
              border: 1px solid rgba(100,180,255,0.2) !important;
              border-top: none !important;
              border-radius: 0 0 12px 12px !important;
              box-shadow: none !important;
            }

  # ════════════════════════════════════════════════════════════════
  # SECTION 6: סטטיסטיקות מהירות
  # ════════════════════════════════════════════════════════════════

  - type: horizontal-stack
    cards:

      - type: custom:mushroom-entity-card
        entity: sensor.oref_alert_zones_count
        name: "אזורים מוזהרים"
        icon: mdi:map-marker-multiple
        icon_color: >-
          {{ 'red' if states('sensor.oref_alert_zones_count') | int(0) > 0 else 'green' }}
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, #0f1525 0%, #151e35 100%) !important;
              border: 1px solid rgba(100,150,255,0.2) !important;
              direction: rtl;
            }

      - type: custom:mushroom-entity-card
        entity: sensor.oref_alert_history
        name: "אזעקות ב-24 שעות"
        icon: mdi:history
        icon_color: yellow
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, #151020 0%, #1e1530 100%) !important;
              border: 1px solid rgba(200,150,255,0.2) !important;
              direction: rtl;
            }

      - type: custom:mushroom-entity-card
        entity: sensor.oref_alert_category
        name: "סוג אירוע"
        icon: mdi:shield-alert
        icon_color: >-
          {{ 'red' if is_state('binary_sensor.oref_alert_active', 'on') else 'grey' }}
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, #150a0a 0%, #251010 100%) !important;
              border: 1px solid rgba(255,100,100,0.2) !important;
              direction: rtl;
            }

################################################################################
# הוסף ל-automations.yaml — התראת TTS + Push בזמן אזעקה
################################################################################

